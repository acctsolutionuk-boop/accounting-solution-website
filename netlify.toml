[[redirects]]
  from = "http://acctsolution.co.uk/*"
  to = "https://acctsolution.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.acctsolution.co.uk/*"
  to = "https://acctsolution.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.acctsolution.co.uk/*"
  to = "https://acctsolution.co.uk/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

